<!-- AI Chat Widget -->
<div id="ai-chat-widget" class="ai-chat-widget ai-chat-minimized">
    <!-- Minimized button -->
    <button id="ai-chat-toggle" class="ai-chat-fab" title="AI Assistant">
        <i class="bi bi-chat-dots-fill"></i>
    </button>

    <!-- Expanded chat panel -->
    <div id="ai-chat-panel" class="ai-chat-panel" style="display:none;">
        <div id="ai-chat-resize-handle" class="ai-chat-resize-handle" title="Drag to resize">
            <i class="bi bi-grip-horizontal"></i>
        </div>
        <div class="ai-chat-header">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-robot"></i>
                <span class="fw-semibold">AI Assistant</span>
            </div>
            <div class="d-flex align-items-center gap-1">
                <button class="btn btn-sm btn-link ai-chat-btn" id="ai-chat-clear" title="Clear chat">
                    <i class="bi bi-trash"></i>
                </button>
                <button class="btn btn-sm btn-link ai-chat-btn" id="ai-chat-minimize" title="Minimize">
                    <i class="bi bi-dash-lg"></i>
                </button>
            </div>
        </div>

        <div id="ai-chat-messages" class="ai-chat-messages">
            <div class="ai-chat-welcome text-center text-muted p-3">
                <i class="bi bi-robot" style="font-size: 2rem;"></i>
                <p class="mt-2 mb-0 small">Ask me anything about the admin data.</p>
            </div>
        </div>

        <div id="ai-chat-typing" class="ai-chat-typing" style="display:none;">
            <div class="ai-chat-bubble ai-chat-bubble-ai">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div id="ai-chat-attachments" class="ai-chat-attachments" style="display:none;"></div>

        <form id="ai-chat-form" class="ai-chat-input-area">
            <input type="file" id="ai-chat-file" accept="image/*" multiple style="display:none;">
            <button type="button" id="ai-chat-attach"
                    class="btn btn-sm btn-outline-secondary ai-chat-attach-btn"
                    title="Attach image">
                <i class="bi bi-paperclip"></i>
            </button>
            <input type="text" id="ai-chat-input" class="form-control form-control-sm"
                   placeholder="Type a message or paste an image..." autocomplete="off">
            <button type="button" id="ai-chat-thinking-toggle"
                    class="btn btn-sm btn-outline-secondary ai-chat-thinking-btn"
                    title="Toggle thinking mode" aria-pressed="false">
                <i class="bi bi-lightbulb"></i>
            </button>
            <button type="submit" class="btn btn-sm btn-primary ai-chat-send">
                <i class="bi bi-send-fill"></i>
            </button>
        </form>
    </div>
</div>
