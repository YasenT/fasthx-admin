<tr class="progress-row" id="progress-{{ view_name }}-{{ item_id }}"
    {% if progress < 100 and status != 'Error' %}
    hx-get="/{{ view_name }}/{{ item_id }}/progress"
    hx-trigger="every 2s"
    hx-swap="outerHTML"
    {% endif %}>
    <td colspan="{{ colspan }}">
        <div class="d-flex align-items-center gap-3 px-3 py-2">
            <span class="text-muted small">#{{ item_id }}:</span>
            <div class="progress flex-grow-1" style="height: 20px;">
                <div class="progress-bar progress-bar-striped
                     {% if status == 'Error' %}bg-danger{% elif progress >= 100 %}bg-success{% else %}progress-bar-animated{% endif %}"
                     role="progressbar"
                     style="width: {% if status == 'Error' %}100{% else %}{{ progress }}{% endif %}%"
                     aria-valuenow="{{ progress }}"
                     aria-valuemin="0"
                     aria-valuemax="100">
                    {% if status == 'Error' %}Error{% else %}{{ progress }}%{% endif %}
                </div>
            </div>
            <span class="badge {% if status == 'Error' %}bg-danger{% elif progress >= 100 %}bg-success{% else %}bg-primary{% endif %}">
                {% if status == 'Error' %}Failed{% elif progress >= 100 %}Complete{% else %}{{ status }}{% endif %}
            </span>
        </div>
    </td>
</tr>
